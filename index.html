<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AFND Industries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:oklch(0.16 0.025 285);font-family:'Manrope',system-ui,sans-serif;color:oklch(0.95 0.01 285);min-height:100vh;overflow-x:hidden;position:relative;}
  ::selection{background:oklch(0.68 0.2 300 / 0.4);color:#fff;}
  a{text-decoration:none;}
  @keyframes afnd-float{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-40px) scale(1.08);}}
  @keyframes afnd-float2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-40px,30px) scale(1.12);}}
  @keyframes afnd-up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
  @keyframes afnd-grad{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
  .afnd-blob1{position:fixed;top:-180px;left:-120px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,oklch(0.68 0.22 300 / 0.5),transparent 65%);filter:blur(40px);animation:afnd-float 18s ease-in-out infinite;pointer-events:none;z-index:0;}
  .afnd-blob2{position:fixed;bottom:-200px;right:-140px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,oklch(0.78 0.15 215 / 0.42),transparent 65%);filter:blur(40px);animation:afnd-float2 22s ease-in-out infinite;pointer-events:none;z-index:0;}
  nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px clamp(20px,5vw,72px);backdrop-filter:blur(14px);background:oklch(0.16 0.025 285 / 0.72);border-bottom:1px solid oklch(0.3 0.03 285 / 0.6);}
  .brand{display:flex;align-items:center;gap:10px;color:inherit;}
  .logo{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,oklch(0.68 0.22 300),oklch(0.78 0.15 215));font-family:'Space Grotesk';font-weight:700;font-size:15px;color:oklch(0.16 0.025 285);}
  .brand-name{font-family:'Space Grotesk';font-weight:600;font-size:17px;letter-spacing:-0.01em;}
  .nav-links{display:flex;align-items:center;gap:clamp(14px,2.5vw,34px);}
  .nav-links a{color:oklch(0.78 0.02 285);font-size:14.5px;font-weight:500;transition:color 0.2s;}
  .nav-links a:hover{color:oklch(0.95 0.01 285);}
  .lang-btn{cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:500;letter-spacing:0.04em;color:oklch(0.95 0.01 285);background:oklch(0.24 0.03 285);border:1px solid oklch(0.36 0.04 285);border-radius:8px;padding:7px 11px;transition:all 0.2s;}
  .lang-btn:hover{border-color:oklch(0.68 0.18 300);color:oklch(0.85 0.12 300);}
  header{position:relative;z-index:1;padding:clamp(70px,12vw,150px) clamp(20px,5vw,72px) clamp(60px,9vw,110px);max-width:1180px;margin:0 auto;}
  .badge{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:13px;color:oklch(0.82 0.1 215);border:1px solid oklch(0.4 0.05 285);border-radius:999px;padding:7px 15px;margin-bottom:30px;animation:afnd-up 0.6s ease both;}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:oklch(0.78 0.15 215);box-shadow:0 0 10px oklch(0.78 0.15 215);}
  h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(46px,9vw,108px);line-height:0.96;letter-spacing:-0.03em;margin:0 0 22px;animation:afnd-up 0.6s ease 0.05s both;}
  .grad-text{background:linear-gradient(100deg,oklch(0.72 0.2 300),oklch(0.82 0.15 215),oklch(0.72 0.2 300));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:afnd-grad 6s ease infinite;}
  .hero-desc{font-size:clamp(18px,2.4vw,24px);line-height:1.5;color:oklch(0.8 0.02 285);max-width:600px;margin:0 0 38px;font-weight:500;animation:afnd-up 0.6s ease 0.12s both;}
  .cta-row{display:flex;flex-wrap:wrap;gap:14px;animation:afnd-up 0.6s ease 0.18s both;}
  .cta-primary{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15.5px;color:oklch(0.16 0.025 285);background:linear-gradient(135deg,oklch(0.72 0.2 300),oklch(0.8 0.15 215));border-radius:11px;padding:14px 24px;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 8px 30px oklch(0.68 0.2 300 / 0.3);}
  .cta-primary:hover{transform:translateY(-3px);box-shadow:0 14px 40px oklch(0.68 0.2 300 / 0.45);}
  .cta-secondary{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15.5px;color:oklch(0.95 0.01 285);background:oklch(0.24 0.03 285);border:1px solid oklch(0.38 0.04 285);border-radius:11px;padding:14px 24px;transition:all 0.2s;}
  .cta-secondary:hover{background:oklch(0.28 0.035 285);border-color:oklch(0.5 0.05 285);transform:translateY(-3px);}
  section{position:relative;z-index:1;padding:clamp(40px,7vw,80px) clamp(20px,5vw,72px);max-width:1180px;margin:0 auto;}
  .kicker{display:flex;align-items:center;gap:12px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;font-size:13px;}
  .kicker .num{color:oklch(0.7 0.14 300);}
  .kicker .label{letter-spacing:0.1em;text-transform:uppercase;color:oklch(0.65 0.02 285);}
  h2{font-family:'Space Grotesk';font-weight:600;font-size:clamp(30px,4.5vw,52px);letter-spacing:-0.02em;margin:0 0 20px;line-height:1.05;}
  .section-desc{font-size:clamp(16px,1.9vw,19px);line-height:1.65;color:oklch(0.78 0.02 285);max-width:760px;margin:0 0 48px;}
  .card-grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}
  .member{display:flex;flex-direction:column;gap:16px;padding:24px;border-radius:18px;background:oklch(0.2 0.025 285 / 0.6);border:1px solid oklch(0.32 0.03 285 / 0.7);transition:transform 0.25s,border-color 0.25s,background 0.25s;color:inherit;}
  .member:hover{transform:translateY(-5px);border-color:oklch(0.6 0.14 300 / 0.7);background:oklch(0.22 0.03 285 / 0.8);}
  .member img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid oklch(0.4 0.05 285);}
  .member .name{font-family:'Space Grotesk';font-weight:600;font-size:17px;line-height:1.25;margin-bottom:7px;}
  .member .role{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:12px;color:oklch(0.8 0.1 215);}
  .member .role .d{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,oklch(0.72 0.2 300),oklch(0.8 0.15 215));}
  .member .user{margin-top:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:oklch(0.6 0.02 285);}
  .project-card{position:relative;overflow:hidden;border-radius:24px;border:1px solid oklch(0.34 0.04 285 / 0.7);background:linear-gradient(135deg,oklch(0.22 0.04 300 / 0.5),oklch(0.2 0.03 215 / 0.4));padding:clamp(28px,4vw,52px);}
  .project-card .glow{position:absolute;top:-80px;right:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,oklch(0.7 0.2 300 / 0.35),transparent 70%);filter:blur(30px);}
  .project-inner{position:relative;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:28px;}
  .project-tag{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:12px;color:oklch(0.85 0.12 215);border:1px solid oklch(0.45 0.06 215 / 0.6);border-radius:999px;padding:5px 12px;margin-bottom:18px;}
  .project-card h3{font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,4vw,42px);letter-spacing:-0.02em;margin:0 0 14px;}
  .project-card p{font-size:17px;line-height:1.6;color:oklch(0.82 0.02 285);margin:0 0 26px;}
  .project-visit{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15px;color:oklch(0.16 0.025 285);background:oklch(0.95 0.01 285);border-radius:11px;padding:13px 22px;transition:transform 0.2s;}
  .project-visit:hover{transform:translateY(-3px);}
  .project-meta{font-family:'JetBrains Mono',monospace;font-size:13px;color:oklch(0.7 0.02 285);min-width:200px;display:flex;flex-direction:column;gap:14px;}
  .project-meta .mlabel{color:oklch(0.55 0.02 285);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
  .tech-card{padding:26px;border-radius:18px;background:oklch(0.2 0.025 285 / 0.6);border:1px solid oklch(0.32 0.03 285 / 0.7);transition:border-color 0.25s;}
  .tech-card:hover{border-color:oklch(0.5 0.08 285 / 0.7);}
  .tech-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .tech-head h3{font-family:'Space Grotesk';font-weight:600;font-size:18px;margin:0;}
  .tech-items{display:flex;flex-wrap:wrap;gap:9px;}
  .tech-pill{display:flex;align-items:center;gap:8px;background:oklch(0.25 0.025 285 / 0.7);border:1px solid oklch(0.34 0.03 285 / 0.6);border-radius:10px;padding:7px 12px 7px 8px;font-size:13.5px;font-weight:500;color:oklch(0.88 0.01 285);}
  .tech-pill img{width:22px;height:22px;display:block;}
  footer{position:relative;z-index:1;margin-top:clamp(50px,8vw,90px);border-top:1px solid oklch(0.3 0.03 285 / 0.6);background:oklch(0.18 0.025 285 / 0.6);backdrop-filter:blur(10px);}
  .footer-inner{max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,80px) clamp(20px,5vw,72px) 40px;}
  .footer-top{display:flex;flex-wrap:wrap;gap:48px;justify-content:space-between;}
  .footer-brand{display:flex;align-items:center;gap:11px;margin-bottom:16px;}
  .footer-brand .logo{width:38px;height:38px;font-size:17px;}
  .footer-brand span:last-child{font-family:'Space Grotesk';font-weight:600;font-size:20px;}
  .footer-tag{font-size:15px;line-height:1.6;color:oklch(0.68 0.02 285);margin:0;max-width:360px;}
  .footer-cols{display:flex;gap:clamp(40px,8vw,90px);flex-wrap:wrap;}
  .footer-cols h4{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:oklch(0.6 0.02 285);margin:0 0 16px;}
  .footer-cols a{display:inline-flex;align-items:center;gap:8px;color:oklch(0.88 0.01 285);font-weight:600;font-size:15px;transition:color 0.2s;}
  .footer-cols a:hover{color:oklch(0.82 0.12 300);}
  .footer-bottom{margin-top:56px;padding-top:24px;border-top:1px solid oklch(0.28 0.03 285 / 0.5);display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;}
  .footer-bottom span{font-family:'JetBrains Mono',monospace;font-size:13px;color:oklch(0.58 0.02 285);}
  @media (max-width:640px){.nav-links a{display:none;}}
</style>
</head>
<body>
  <div class="afnd-blob1" aria-hidden="true"></div>
  <div class="afnd-blob2" aria-hidden="true"></div>

  <nav>
    <a href="#top" class="brand">
      <span class="logo">A</span>
      <span class="brand-name">AFND</span>
    </a>
    <div class="nav-links">
      <a href="#about" data-i18n="navAbout"></a>
      <a href="#projects" data-i18n="navProjects"></a>
      <a href="#tech" data-i18n="navTech"></a>
      <a href="#contact" data-i18n="navContact"></a>
      <button class="lang-btn" id="langBtn"></button>
    </div>
  </nav>

  <header id="top">
    <div class="badge"><span class="dot"></span><span data-i18n="heroBadge"></span></div>
    <h1>AFND<br><span class="grad-text">Industries</span></h1>
    <p class="hero-desc" data-i18n="heroDesc"></p>
    <div class="cta-row">
      <a href="#projects" class="cta-primary"><span data-i18n="ctaProjects"></span> →</a>
      <a href="https://github.com/AFND-Industries" target="_blank" rel="noopener" class="cta-secondary"><span data-i18n="ctaGithub"></span> ↗</a>
    </div>
  </header>

  <section id="about">
    <div class="kicker"><span class="num">01</span><span class="label" data-i18n="aboutKicker"></span></div>
    <h2 data-i18n="aboutTitle"></h2>
    <p class="section-desc" data-i18n="aboutDesc"></p>
    <div class="card-grid" id="teamGrid"></div>
  </section>

  <section id="projects">
    <div class="kicker"><span class="num">02</span><span class="label" data-i18n="projectsKicker"></span></div>
    <h2 data-i18n="projectsTitle"></h2>
    <p class="section-desc" data-i18n="projectsDesc"></p>
    <div class="project-card">
      <div class="glow" aria-hidden="true"></div>
      <div class="project-inner">
        <div style="max-width:560px;">
          <div class="project-tag">crypto · fintech</div>
          <h3>InfoChange</h3>
          <p data-i18n="infochangeDesc"></p>
          <a href="https://infochange.me" target="_blank" rel="noopener" class="project-visit"><span data-i18n="visitInfochange"></span> ↗</a>
        </div>
        <div class="project-meta">
          <div><div class="mlabel" data-i18n="stackLabel"></div>React · Node · Spring</div>
          <div><div class="mlabel" data-i18n="statusLabel"></div><span style="color:oklch(0.82 0.13 150);">● <span data-i18n="statusLive"></span></span></div>
        </div>
      </div>
    </div>
  </section>

  <section id="tech">
    <div class="kicker"><span class="num">03</span><span class="label" data-i18n="techKicker"></span></div>
    <h2 data-i18n="techTitle" style="margin-bottom:40px;"></h2>
    <div class="card-grid" id="techGrid"></div>
  </section>

  <footer id="contact">
    <div class="footer-inner">
      <div class="footer-top">
        <div>
          <div class="footer-brand"><span class="logo">A</span><span>AFND Industries</span></div>
          <p class="footer-tag" data-i18n="footerTagline"></p>
        </div>
        <div class="footer-cols">
          <div>
            <h4 data-i18n="contactSocials"></h4>
            <a href="https://github.com/AFND-Industries" target="_blank" rel="noopener">GitHub ↗</a>
          </div>
          <div>
            <h4 data-i18n="contactContact"></h4>
            <a href="mailto:afndindustries@gmail.com">afndindustries@gmail.com</a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <span id="copyYear"></span>
        <span data-i18n="footerMade"></span>
      </div>
    </div>
  </footer>

<script>
(function(){
  var I18N = {
    es: {
      navAbout:'Equipo', navProjects:'Proyectos', navTech:'Stack', navContact:'Contacto',
      heroBadge:'colectivo de desarrollo software',
      heroDesc:'Somos un equipo de ingenieros de software que construye productos reales para aprender, experimentar y dominar nuevas tecnologías.',
      ctaProjects:'Ver proyectos', ctaGithub:'GitHub',
      aboutKicker:'Quiénes somos', aboutTitle:'Estudiantes que construyen cosas',
      aboutDesc:'Somos estudiantes de Ingeniería de Software que en nuestro tiempo libre realizamos proyectos de diversa índole, para aprender distintos frameworks y mejorar nuestras habilidades de desarrollo. El equipo de AFND Industries está compuesto por:',
      projectsKicker:'Proyectos', projectsTitle:'Lo que hemos lanzado',
      projectsDesc:'Una selección de los proyectos más destacados que hemos llevado de la idea a producción.',
      infochangeDesc:'InfoChange es la solución para la compra y venta de criptomonedas de forma rápida, simple e intuitiva.',
      visitInfochange:'Visitar InfoChange', stackLabel:'Stack', statusLabel:'Estado', statusLive:'En producción',
      techKicker:'Tecnologías', techTitle:'Nuestro stack',
      footerTagline:'Un equipo de ingenieros de software construyendo proyectos por el placer de aprender.',
      contactSocials:'Redes sociales', contactContact:'Contacto',
      footerMade:'Hecho con café y curiosidad',
      role:'Co-Fundador',
      tWeb:'Tecnologías web', tDb:'Bases de datos', tGen:'Programación general', tGame:'Videojuegos'
    },
    en: {
      navAbout:'Team', navProjects:'Projects', navTech:'Stack', navContact:'Contact',
      heroBadge:'software development collective',
      heroDesc:'We are a team of software engineers building real products to learn, experiment and master new technologies.',
      ctaProjects:'View projects', ctaGithub:'GitHub',
      aboutKicker:'Who we are', aboutTitle:'Students who build things',
      aboutDesc:'We are Software Engineering students who, in our free time, build all kinds of projects to learn different frameworks and sharpen our development skills. The AFND Industries team is made up of:',
      projectsKicker:'Projects', projectsTitle:'What we have shipped',
      projectsDesc:'A selection of the projects we are most proud of, taken from idea to production.',
      infochangeDesc:'InfoChange is the solution for buying and selling cryptocurrencies in a fast, simple and intuitive way.',
      visitInfochange:'Visit InfoChange', stackLabel:'Stack', statusLabel:'Status', statusLive:'Live',
      techKicker:'Technologies', techTitle:'Our stack',
      footerTagline:'A team of software engineers building projects for the joy of learning.',
      contactSocials:'Social', contactContact:'Contact',
      footerMade:'Made with coffee and curiosity',
      role:'Co-Founder',
      tWeb:'Web technologies', tDb:'Databases', tGen:'General programming', tGame:'Game development'
    }
  };

  var TEAM = [
    { name:'Antonio Cañete Baena', user:'antbaena' },
    { name:'Antonio Blas Moral Sánchez', user:'tb18003' },
    { name:'Alejandro Román Sánchez', user:'alers16' },
    { name:'Eulogio Quemada Torres', user:'eulogioqt' }
  ];

  function ic(i){ return 'https://skillicons.dev/icons?i=' + i; }

  function techGroups(t){
    return [
      { emoji:'🌐', title:t.tWeb, items:[
        {name:'React', icon:ic('react')}, {name:'Node.js', icon:ic('nodejs')},
        {name:'Express', icon:ic('express')}, {name:'Spring', icon:ic('spring')},
        {name:'Flutter', icon:ic('flutter')}
      ]},
      { emoji:'🗄️', title:t.tDb, items:[
        {name:'MySQL', icon:ic('mysql')}, {name:'SQLite', icon:ic('sqlite')}
      ]},
      { emoji:'⚙️', title:t.tGen, items:[
        {name:'Java', icon:ic('java')}, {name:'Python', icon:ic('python')},
        {name:'C', icon:ic('c')}, {name:'JavaScript', icon:ic('js')}
      ]},
      { emoji:'🎮', title:t.tGame, items:[
        {name:'C#', icon:ic('cs')}, {name:'Unity', icon:ic('unity')}
      ]}
    ];
  }

  var lang = 'es';

  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function renderTeam(t){
    var html = TEAM.map(function(m){
      return '<a class="member" href="https://github.com/'+esc(m.user)+'" target="_blank" rel="noopener">'
        + '<img src="https://github.com/'+esc(m.user)+'.png" alt="'+esc(m.name)+'" width="60" height="60" loading="lazy">'
        + '<div><div class="name">'+esc(m.name)+'</div>'
        + '<div class="role"><span class="d"></span>'+esc(t.role)+'</div></div>'
        + '<div class="user">@'+esc(m.user)+' ↗</div></a>';
    }).join('');
    document.getElementById('teamGrid').innerHTML = html;
  }

  function renderTech(t){
    var html = techGroups(t).map(function(g){
      var items = g.items.map(function(tech){
        return '<div class="tech-pill"><img src="'+tech.icon+'" alt="" width="22" height="22" loading="lazy">'+esc(tech.name)+'</div>';
      }).join('');
      return '<div class="tech-card"><div class="tech-head"><span style="font-size:22px;">'+g.emoji+'</span>'
        + '<h3>'+esc(g.title)+'</h3></div><div class="tech-items">'+items+'</div></div>';
    }).join('');
    document.getElementById('techGrid').innerHTML = html;
  }

  function apply(){
    var t = I18N[lang];
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      var key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.getElementById('langBtn').textContent = lang === 'es' ? 'EN' : 'ES';
    renderTeam(t);
    renderTech(t);
  }

  document.getElementById('langBtn').addEventListener('click', function(){
    lang = lang === 'es' ? 'en' : 'es';
    apply();
  });

  document.getElementById('copyYear').textContent = '© ' + new Date().getFullYear() + ' AFND Industries ;)';
  apply();
})();
</script>
</body>
</html>
